<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR SCANNER E2E SPA 测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
      line-height: 1.6;
      color: #333;
    }
    h1 { color: #0078d4; }
    .nav {
      display: flex;
      gap: 10px;
      margin: 20px 0;
      padding: 12px;
      background: #f0f7fc;
      border-radius: 8px;
    }
    .nav button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #0078d4;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    .nav button:hover { opacity: 0.9; }
    .nav button.secondary {
      background: #f3f3f3;
      color: #333;
    }
    .page {
      display: none;
      padding: 20px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-top: 16px;
    }
    .page.active { display: block; }
    .page h2 { margin-top: 0; color: #0078d4; }
    img {
      margin: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      display: inline-block;
    }
    .controls {
      margin: 16px 0;
      padding: 12px;
      background: #f9f9f9;
      border-radius: 6px;
    }
    .controls button {
      padding: 6px 12px;
      margin-right: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    .controls button:hover { background: #f0f0f0; }
    .log {
      margin-top: 20px;
      padding: 12px;
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    .log .info { color: #4fc1ff; }
    .log .success { color: #89d185; }
    .log .warn { color: #dcdcaa; }
    .note {
      color: #555;
      font-size: 14px;
      background: #f0f7fc;
      padding: 12px 16px;
      border-radius: 6px;
      border-left: 4px solid #0078d4;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <h1>QR SCANNER — SPA 端到端测试页</h1>
  <p class="note">
    本页面模拟 SPA 路由切换和动态内容加载，用于测试扩展的 MutationObserver 和自动重扫功能。<br>
    打开浏览器开发者工具（F12），观察 Console 中的扩展日志输出。
  </p>

  <div class="nav">
    <button onclick="navigateTo('/home')">首页</button>
    <button onclick="navigateTo('/products')">商品页</button>
    <button onclick="navigateTo('/about')">关于页</button>
    <button class="secondary" onclick="loadMoreContent()">加载更多内容</button>
    <button class="secondary" onclick="clearDynamicContent()">清除动态内容</button>
  </div>

  <!-- 首页 -->
  <div id="page-home" class="page active">
    <h2>首页</h2>
    <p>这是首页，包含 2 个二维码。路由切换后应触发自动扫描。</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://bing.com/home" alt="Home QR 1">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://microsoft.com/home" alt="Home QR 2">
  </div>

  <!-- 商品页 -->
  <div id="page-products" class="page">
    <h2>商品列表</h2>
    <p>这是商品页，包含 1 个二维码。</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=product-12345" alt="Product QR">
    <div id="products-dynamic"></div>
  </div>

  <!-- 关于页 -->
  <div id="page-about" class="page">
    <h2>关于我们</h2>
    <p>这是关于页，没有二维码。切换到这里不应产生误报。</p>
  </div>

  <!-- 动态内容区域 -->
  <div class="controls">
    <strong>动态加载测试</strong><br>
    <button onclick="insertQR()">插入单个二维码</button>
    <button onclick="insertMultipleQR()">插入多个二维码</button>
    <button onclick="insertNonQR()">插入非二维码图片</button>
    <button onclick="insertSmallQR()">插入小尺寸二维码（应被过滤）</button>
  </div>
  <div id="dynamic-area"></div>

  <div class="log" id="log">
    <div class="info">[测试页面] 等待操作...</div>
  </div>

  <script>
    const logEl = document.getElementById('log');
    let qrCounter = 0;

    function log(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // SPA 路由导航
    function navigateTo(path) {
      log(`导航到: ${path}`, 'warn');
      history.pushState({ path }, '', path);
      showPage(path);
    }

    function showPage(path) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      if (path === '/home' || path === '/') {
        document.getElementById('page-home').classList.add('active');
      } else if (path === '/products') {
        document.getElementById('page-products').classList.add('active');
      } else if (path === '/about') {
        document.getElementById('page-about').classList.add('active');
      }
      log(`页面已切换: ${path}`, 'success');
    }

    window.addEventListener('popstate', (e) => {
      const path = e.state ? e.state.path : location.pathname;
      log(`浏览器前进/后退: ${path}`, 'warn');
      showPage(path);
    });

    // 动态插入内容
    function insertQR() {
      qrCounter++;
      const img = document.createElement('img');
      img.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=dynamic-qr-${qrCounter}`;
      img.alt = `Dynamic QR ${qrCounter}`;
      img.onload = () => log(`二维码图片加载完成: dynamic-qr-${qrCounter}`, 'success');
      document.getElementById('dynamic-area').appendChild(img);
    }

    function insertMultipleQR() {
      for (let i = 0; i < 3; i++) {
        setTimeout(() => insertQR(), i * 200);
      }
      log('批量插入 3 个二维码（间隔 200ms）', 'warn');
    }

    function insertNonQR() {
      const img = document.createElement('img');
      img.src = 'https://via.placeholder.com/200x200/f0f0f0/333?text=Not+QR';
      img.alt = 'Not a QR code';
      document.getElementById('dynamic-area').appendChild(img);
      log('插入非二维码图片', 'info');
    }

    function insertSmallQR() {
      const img = document.createElement('img');
      img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=30x30&data=tiny';
      img.alt = 'Tiny QR';
      img.style.width = '30px';
      img.style.height = '30px';
      document.getElementById('dynamic-area').appendChild(img);
      log('插入 30x30 小尺寸二维码（应被过滤）', 'info');
    }

    function loadMoreContent() {
      const container = document.getElementById('products-dynamic');
      const wrapper = document.createElement('div');
      wrapper.innerHTML = `
        <p>异步加载的商品推荐：</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=recommend-001" alt="Recommend QR">
      `;
      container.appendChild(wrapper);
      log('商品页异步加载更多内容', 'warn');
    }

    function clearDynamicContent() {
      document.getElementById('dynamic-area').innerHTML = '';
      document.getElementById('products-dynamic').innerHTML = '';
      log('动态内容已清除', 'info');
    }

    // 初始状态
    log('SPA 测试页面已加载', 'success');
    log('操作提示：点击导航按钮切换路由，或使用按钮插入动态内容', 'info');
  </script>
</body>
</html>
