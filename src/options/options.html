<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>QR Hunt 设置</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 { font-size: 24px; margin-bottom: 16px; }
    .setting {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .hint {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>QR Hunt 设置</h1>

  <div class="setting">
    <label>自动扫描模式</label>
    <p class="hint">暂不支持，将在后续版本上线。</p>
  </div>

  <div class="setting">
    <label>扫描历史记录</label>
    <p class="hint">最多保留 50 条记录。</p>
  </div>

  <script src="options.js"></script>
</body>
</html>
