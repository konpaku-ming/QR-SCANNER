<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR SCANNER 单元测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      color: #333;
    }
    h1 { color: #0078d4; }
    h2 { font-size: 18px; margin-top: 32px; border-bottom: 1px solid #e0e0e0; padding-bottom: 6px; }
    .pass { color: #107c10; }
    .fail { color: #d83b01; font-weight: bold; }
    .summary { font-size: 18px; margin-top: 24px; padding: 16px; border-radius: 8px; }
    .summary.all-pass { background: #e8f5e9; }
    .summary.has-fail { background: #ffebee; }
  </style>
</head>
<body>
  <h1>QR SCANNER 单元测试</h1>
  <p>本页面在不依赖扩展上下文的情况下，测试共享纯函数与基础 DOM 行为。</p>
  <div id="results"></div>

  <script src="../src/lib/qr-utils.js"></script>
  <script>
    const resultsEl = document.getElementById('results');
    let passCount = 0;
    let failCount = 0;

    function assert(condition, message) {
      if (condition) {
        passCount++;
        resultsEl.innerHTML += `<div class="pass">✅ ${escapeHtml(message)}</div>`;
      } else {
        failCount++;
        resultsEl.innerHTML += `<div class="fail">❌ ${escapeHtml(message)}</div>`;
      }
    }

    function section(title) {
      resultsEl.innerHTML += `<h2>${escapeHtml(title)}</h2>`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    section('字符串截断');
    assert(QR_UTILS.truncate('hello world', 5) === 'hello…', '长字符串应截断并追加省略号');
    assert(QR_UTILS.truncate('hi', 5) === 'hi', '短字符串应保持原样');
    assert(QR_UTILS.truncate('', 5) === '', '空字符串应返回空');
    assert(QR_UTILS.truncate(null, 5) === '', 'null 应返回空');

    section('设置合并');
    const defaults = QR_UTILS.mergeSettings({});
    assert(defaults.maxHistoryItems === 50, 'mergeSettings 应补齐 maxHistoryItems 默认值');
    assert(defaults.openOnlyHttpLinks === true, 'mergeSettings 应补齐 openOnlyHttpLinks 默认值');
    assert(!('autoScanEnabled' in defaults), 'mergeSettings 不应再暴露自动扫描设置');
    assert(QR_UTILS.mergeSettings({ maxHistoryItems: 999 }).maxHistoryItems === 200, 'mergeSettings 应钳位历史记录上限');
    assert(QR_UTILS.mergeSettings({ maxHistoryItems: -1 }).maxHistoryItems === 1, 'mergeSettings 应钳位历史记录下限');

    section('URL 安全');
    assert(QR_UTILS.normalizeUrl('./qr.png', 'https://example.com/page/index.html') === 'https://example.com/page/qr.png', 'normalizeUrl 应支持相对 URL');
    assert(QR_UTILS.isHttpUrl('https://example.com') === true, 'isHttpUrl 应接受 HTTPS');
    assert(QR_UTILS.isHttpUrl('mailto:test@example.com') === false, 'isHttpUrl 应拒绝非 HTTP 协议');
    assert(QR_UTILS.getOpenableUrl('https://example.com') === 'https://example.com/', 'getOpenableUrl 应允许 HTTPS');
    assert(QR_UTILS.getOpenableUrl('plain text') === null, 'getOpenableUrl 应拒绝普通文本');
    assert(QR_UTILS.getOpenableUrl('javascript:alert(1)') === null, 'getOpenableUrl 应拒绝危险协议');

    section('Overlay 坐标');
    const elementRect = QR_UTILS.overlayRectFromElementRect(
      { left: 10, top: 20, width: 80, height: 60 },
      100,
      200
    );
    assert(elementRect.x === 110 && elementRect.y === 220 && elementRect.width === 80 && elementRect.height === 60, 'overlayRectFromElementRect 应叠加滚动偏移');

    const qrRect = QR_UTILS.overlayRectFromQrLocation({
      topLeftCorner: { x: 20, y: 40 },
      topRightCorner: { x: 120, y: 40 },
      bottomRightCorner: { x: 120, y: 140 },
      bottomLeftCorner: { x: 20, y: 140 }
    }, 2);
    assert(qrRect.x === 10 && qrRect.y === 20 && qrRect.width === 50 && qrRect.height === 50, 'overlayRectFromQrLocation 应按 DPR 映射坐标');

    section('历史记录');
    const history = QR_UTILS.upsertHistoryItem(
      [{ id: 'old', data: 'same', timestamp: 1 }],
      'same',
      { id: 'new', url: '剪贴板截图', now: 2000 },
      { maxHistoryItems: 5 }
    );
    assert(history.length === 1 && history[0].id === 'new' && history[0].url === '剪贴板截图', 'upsertHistoryItem 应去重并更新顶部记录');
    assert(QR_UTILS.deleteHistoryItem(history, 'new').length === 0, 'deleteHistoryItem 应删除指定记录');
    assert(QR_UTILS.formatRelativeTime(1000, 1000 + 30 * 1000) === '刚刚', 'formatRelativeTime 应格式化刚刚');
    assert(QR_UTILS.getBadgeText(3) === '3' && QR_UTILS.getBadgeText(0) === '', 'getBadgeText 应正确生成 Badge 文本');

    section('Overlay DOM 清理模拟');
    const overlay = document.createElement('div');
    overlay.className = 'qrhunt-overlay';
    const menu = document.createElement('div');
    menu.className = 'qrhunt-menu';
    document.body.appendChild(overlay);
    document.body.appendChild(menu);
    assert(document.querySelectorAll('.qrhunt-overlay').length === 1, 'Overlay 应被添加到 DOM');
    assert(document.querySelectorAll('.qrhunt-menu').length === 1, '菜单应被添加到 DOM');
    document.querySelectorAll('.qrhunt-overlay, .qrhunt-menu').forEach((el) => el.remove());
    assert(document.querySelectorAll('.qrhunt-overlay, .qrhunt-menu').length === 0, 'Overlay 与菜单应可快速清除');

    window.addEventListener('load', () => {
      const summary = document.createElement('div');
      summary.className = 'summary ' + (failCount === 0 ? 'all-pass' : 'has-fail');
      summary.innerHTML = `
        <strong>测试汇总</strong>：通过 ${passCount} 项，失败 ${failCount} 项。
        ${failCount === 0 ? '<br>🎉 所有测试通过！' : '<br>⚠️ 存在失败的测试，请检查上方详情。'}
      `;
      document.body.appendChild(summary);
    });
  </script>
</body>
</html>
