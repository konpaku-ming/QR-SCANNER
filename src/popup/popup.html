<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h1>QR SCANNER</h1>
    <p class="subtitle">网页二维码识别器</p>

    <button id="btn-scan" class="btn primary">扫描当前页面</button>
    <button id="btn-clipboard" class="btn primary">识别剪贴板</button>
    <button id="btn-clear" class="btn secondary">清除标记</button>

    <div id="status" class="status"></div>

    <div class="history-section">
      <div class="history-header">
        <h2>最近识别</h2>
        <button id="btn-clear-history" class="btn-text">清空</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>

    <hr />

    <div class="footer">
      <a href="../options/options.html" target="_blank">设置</a>
    </div>
  </div>

  <script src="../lib/zxing-wasm/zxing-wasm.iife.js"></script>
  <script src="../lib/qr-utils.js"></script>
  <script src="../lib/qr-engine.js"></script>
  <script src="popup.js"></script>
</body>
</html>
